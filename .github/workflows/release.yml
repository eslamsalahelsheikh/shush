name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-dbus python3-gi \
            gir1.2-glib-2.0 python3-pip python3-venv

      - name: Install test dependencies
        run: |
          python3 -m pip install --break-system-packages pytest
          python3 -m pip install --break-system-packages --no-deps .

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build-python:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: python3 -m pip install --break-system-packages build

      - name: Build sdist and wheel
        run: python3 -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper \
            dh-python python3-all python3-setuptools python3-pyqt5 \
            python3-dbus python3-gi gir1.2-glib-2.0

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p deb-out
          cp ../*.deb deb-out/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: deb-out/

  publish:
    needs: [build-python, build-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: deb-out/

      - name: Extract changelog for this release
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SECTION=$(python3 -c "
          import re, sys
          text = open('CHANGELOG.md').read()
          pattern = rf'## {re.escape(TAG)} —.*?\n(.*?)(?=\n## |\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else 'Release v$TAG')
          ")
          echo "body<<DELIM" >> "$GITHUB_OUTPUT"
          echo "$SECTION" >> "$GITHUB_OUTPUT"
          echo "DELIM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/*
            deb-out/*.deb

      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* -u __token__ -p "$PYPI_TOKEN"
