name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 python3-dbus python3-gi \
            gir1.2-glib-2.0 python3-pip python3-venv

      - name: Install test dependencies
        run: |
          python3 -m pip install --break-system-packages pytest
          python3 -m pip install --break-system-packages --no-deps .

      - name: Compile check all modules
        run: python3 -m compileall shush/ -q

      - name: Run tests
        run: python3 -m pytest tests/ -v
